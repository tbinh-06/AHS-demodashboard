const fM=n=>(Math.round(n/100000)/10).toFixed(1)+'M';

function spark(arr,color){const max=Math.max.apply(null,arr.concat([1]));const w=70,h=24,n=arr.length;const bw=w/n-2;return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle">`+arr.map((v,i)=>{const bh=Math.max(1,v/max*h);return `<rect x="${(i*(w/n)).toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="1" fill="${i===n-1?color:'#B5D4F4'}"/>`;}).join('')+`</svg>`;}
function mini3(dP,tP){const rP=Math.max(0,100-dP-tP);return `<div class="mini3"><div style="width:${dP}%;background:#185FA5"></div><div style="width:${tP}%;background:#378ADD"></div><div style="width:${rP}%;background:transparent"></div></div>`;}
function canCode(base,i){if(i===0)return base||'—';const m=(''+base).match(/^(.*?)(\d+)$/);if(m){return m[1]+String(parseInt(m[2],10)+i).padStart(m[2].length,'0');}return base+'-'+(i+1);}
let charts={};
function kc(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}
function tax(t){if(t<=0)return 0;const b=[[5e6,.05],[5e6,.1],[8e6,.15],[14e6,.2],[20e6,.25],[28e6,.3],[Infinity,.35]];let x=0,r=t;for(const[l,rt]of b){if(r<=0)break;const tx=Math.min(r,l);x+=tx*rt;r-=tx;}return Math.round(x);}
function calc(d){
  const lb=d.role==='CTV'?0:Math.round(d.luong*(d.ngayCong/(d.chuanT||24.5)));
  const hhN=d.hhDa.reduce((s,x)=>{const t=x.dots.find(dd=>dd.cur);return s+(t?t.hh:0);},0);
  const kq=d.kqkd||0;
  const gross=lb+hhN+kq+(d.thuongDA||0)+(d.thuongTet||0)+(d.luongT13||0)+(d.ot||0)+(d.xe||0)+(d.an||0)+(d.khac||0)-(d.phat||0);
  const bh=Math.round(d.bhxhBase*.105);
  const gtgcA=d.gtgc?(11000000+d.pt*4400000):0;
  const tinhthu=Math.max(0,gross-bh-gtgcA);
  const t=tax(tinhthu);
  return{lb,hhN,kq,gross,bh,gtgcA,chuthu:Math.max(0,gross-(d.an||0)),tinhthu,tax:t,net:gross-(bh+t)};
}
function diffStr(now,prev){if(!prev)return'';const d=Math.round(now-prev),p=Math.round((now-prev)/prev*100);return`<span class="${d>=0?'up':'dn'}">${d>=0?'+':''}${fM(d)} (${p>=0?'+':''}${p}%)</span>`}

  if(DOW[i]==='CN'&&!v)return`<div class="ac acCN">CN</div>`;

}

}

let CUR=null,selDA=new Set(),PERIOD='';

window.go=function(){
  kc();
  const id=document.getElementById('nv').value.trim().toUpperCase();
  const dS=document.getElementById('dStart').value||'2026-01-01';
  const dE=document.getElementById('dEnd').value||'2026-01-31';
  const sD=dS<dE?dS:dE,eD=dS<dE?dE:dS;
  const mon=eD.slice(0,7)==='2025-12'?'T12/2025':'T01/2026';
  PERIOD=sD.split('-').reverse().join('/')+' – '+eD.split('-').reverse().join('/');
  const d=DB[id];
  document.getElementById('content').style.display=d?'block':'none';
  document.getElementById('nf').style.display=d?'none':'block';
  if(!d)return;
  CUR={d,mon,id,cids:{},tabMap:{}};selDA=new Set();
  const c=calc(d);
  const hasTeam=d.role==='GĐKD'||d.role==='TPKD';
  const order=hasTeam?[['t1','analytics','Phân tích','ti-chart-bar'],['t2','team','Cơ chế & Team','ti-users'],['t3','phieu','Phiếu lương','ti-receipt']]:[['t1','analytics','Phân tích','ti-chart-bar'],['t2','phieu','Phiếu lương','ti-receipt']];
  order.forEach(o=>{CUR.tabMap[o[0]]=o[1];CUR.cids[o[1]]=o[0];});
  document.getElementById('tabs-bar').innerHTML=order.map((o,i)=>`<button class="tab${i===0?' on':''}" data-tab="${o[0]}"><span style="margin-right:5px;display:inline-flex;vertical-align:middle">${ico(o[3],13)}</span>${o[2]}</button>`).join('');
  document.querySelectorAll('#tabs-bar .tab').forEach(b=>b.addEventListener('click',function(){switchTab(this,this.getAttribute('data-tab'));}));
  ['t1','t2','t3'].forEach(tid=>{const el=document.getElementById(tid);el.innerHTML='';el.className='pnl';});
  document.getElementById(order[0][0]).classList.add('on');
  try{rPH(d,c,id,mon)}catch(e){console.error('PH',e)}
  try{rKP(d,c,mon)}catch(e){console.error('KP',e)}
  try{renderType(order[0][1],order[0][0],d,c,mon)}catch(e){console.error('first',e)}
};

function renderType(type,cid,d,c,mon){
  if(type==='phieu')rPhieu(d,c,mon,cid);
  else if(type==='team')rTeam(d,c,mon,cid);
  else if(type==='analytics'){CUR.cids.analytics=cid;rAnalytics(d,c,mon,cid);}
}
function switchTab(el,id){
  kc();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');document.getElementById(id).classList.add('on');
  if(!CUR)return;
  try{renderType(CUR.tabMap[id],id,CUR.d,calc(CUR.d),CUR.mon)}catch(e){console.error('switch',e)}
}

  if(c.lb>0)a.push(['Lương cứng ('+d.ngayCong+'/'+d.chuanT+' công)',c.lb]);
  if(c.hhN>0)a.push(['Hoa hồng dự án (kỳ này)',c.hhN]);
  if(c.kq>0)a.push(['Thưởng KQKD Ban TGĐ',c.kq]);
  if(d.thuongDA>0)a.push(['Thưởng dự án',d.thuongDA]);
  if(d.thuongTet>0)a.push(['Thưởng Tết 2026',d.thuongTet]);
  if(d.luongT13>0)a.push(['Lương tháng 13',d.luongT13]);
  if(d.xe>0)a.push(['Hỗ trợ xăng xe',d.xe]);
  if(d.an>0)a.push(['Phụ cấp ăn trưa',d.an]);
  if(d.khac>0)a.push(['Phụ cấp khác',d.khac]);
  if(d.phat>0)a.push(['Khấu trừ vi phạm',-d.phat]);
  a.push(['TỔNG THU NHẬP (GROSS)',c.gross]);
  a.push([]);
  a.push(['KHẤU TRỪ','Số tiền (đ)']);
  a.push(['BHXH + BHYT + BHTN (10,5%)',-c.bh]);
  a.push(['Thuế TNCN (biểu lũy tiến)',-c.tax]);
  a.push(['TỔNG KHẤU TRỪ',-(c.bh+c.tax)]);
  a.push([]);
  a.push(['THỰC NHẬN',c.net]);
  const ws=XLSX.utils.aoa_to_sheet(a);
  ws['!cols']=[{wch:36},{wch:16},{wch:3},{wch:10},{wch:20}];
  const wb=XLSX.utils.book_new();

};

function rKP(d,c,mon){
  const useKpi=d.kpiDs>0;
  const frac=d.chuanT>0?Math.min(1,Math.max(.3,d.ngayCong/d.chuanT)):0.9;
  const daysLeft=d.chuanT>0?Math.max(0,d.chuanT-d.ngayCong):0;
  const projDS=useKpi?Math.round(d.dsTeam/frac):0;
  const projNet=Math.round(c.net/frac);
  const datPct=useKpi?Math.round(d.dsTeam/d.kpiDs*100):0;
  const rrPct=useKpi?Math.round(projDS/d.kpiDs*100):0;
  const totalCt=d.hhDa.reduce((s,x)=>s+x.hhTong,0);
  const recvAll=d.hhDa.reduce((s,x)=>s+x.dots.filter(dd=>dd.done).reduce((a,dd)=>a+dd.hh,0),0);
  const pipeline=totalCt-recvAll-c.hhN;
  const kpiCard=useKpi?`
    <div class="kc">
      <div class="kl">KPI tháng — ${fM(d.kpiDs)}</div>
      <div class="kbar"><span class="kbar-l">Đạt</span><span class="kbar-v">${datPct}%</span></div>
      <div class="pg" style="height:6px"><div class="pf" style="width:${Math.min(100,datPct)}%;background:#185FA5"></div></div>
      <div class="kbar" style="margin-top:8px"><span class="kbar-l">Runrate</span><span class="kbar-v">${rrPct}%</span></div>
      <div class="pg" style="height:6px"><div class="pf" style="width:${Math.min(100,rrPct)}%;background:#378ADD"></div></div>
    </div>`:`
    <div class="kc">
      <div class="kl">Runrate thu nhập</div>
      <div class="kbar"><span class="kbar-l">Hiện tại</span><span class="kbar-v">${fM(c.net)}</span></div>
      <div class="pg" style="height:6px"><div class="pf" style="width:${projNet?Math.min(100,Math.round(c.net/projNet*100)):100}%;background:#185FA5"></div></div>
      <div class="kbar" style="margin-top:8px"><span class="kbar-l">Cuối tháng</span><span class="kbar-v">${fM(projNet)}</span></div>
      <div class="ks" style="margin-top:5px">Còn ${daysLeft} ngày công</div>
    </div>`;
  document.getElementById('kp').innerHTML=`
  <div class="krow">
    ${kpiCard}
    <div class="kc"><div class="kl">HH kỳ này</div><div class="kv">${f(c.hhN)}</div><div class="ks">${d.hhDa.filter(x=>x.dots.find(dd=>dd.cur)).length} DA đến hạn · ${d.hhMuc!=='—'?'Mức '+d.hhMuc:'Tiến độ'}</div></div>
    <div class="kc"><div class="kl">HH pipeline còn lại</div><div class="kv">${f(pipeline)}</div><div class="ks">Tổng HĐ ${fM(totalCt)} · đã về ${totalCt?Math.round(recvAll/totalCt*100):0}%</div></div>
  </div>`;
}

function renderHHSection(){
  const d=CUR.d,el=document.getElementById('hhsec');
  if(!el)return;
  if(!d.hhDa.length){el.innerHTML='<div class="nf">Không áp dụng HH dự án.</div>';return;}
  const isAll=selDA.size===0;
  const show=isAll?d.hhDa:d.hhDa.filter(x=>selDA.has(x.da));
  const totHH=show.reduce((s,x)=>{const t=x.dots.find(dd=>dd.cur);return s+(t?t.hh:0);},0);
  const lbl=isAll?'Tất cả dự án ('+d.hhDa.length+')':selDA.size+' dự án được chọn';
  let sDS=0,sHHt=0,sDa=0,sCl=0,sCur=0;
  const rows=show.map((x,idx)=>{
    const cur=x.dots.find(dd=>dd.cur);
    const dH=x.dots.filter(dd=>dd.done).reduce((s,dd)=>s+dd.hh,0);
    const dP=x.dots.filter(dd=>dd.done).reduce((s,dd)=>s+dd.p,0);
    const tP=cur?cur.p:0;
    const cl=x.hhTong-dH-(cur?cur.hh:0);
    sDS+=x.ds;sHHt+=x.hhTong;sDa+=dH;sCl+=cl;sCur+=(cur?cur.hh:0);
    const done=x.dots.filter(dd=>dd.done);
    const detRows='<div class="dd-title">Chi tiết theo căn — '+x.da+' · '+x.dots.length+' căn · DS '+fM(x.ds)+' · HH '+(x.hhR*100).toFixed(1)+'% = '+f(x.hhTong)+'</div>'+'<div style="overflow-x:auto"><table class="tbl" style="min-width:680px;background:var(--color-background-primary)"><thead><tr>'+'<th style="width:22%">Mã căn</th><th style="width:14%">Ngày ký</th><th style="width:17%">Doanh số</th><th style="width:11%">%HH</th><th style="width:17%">Hoa hồng</th><th style="width:19%">Trạng thái</th></tr></thead><tbody>'+x.dots.map(function(dd,i){var dsC=x.hhR?Math.round(dd.hh/x.hhR):0;var pT=x.hhTong?dd.hh/x.hhTong*100:0;var st=dd.done?'<span class="bdg bg">Đã nhận</span>':(dd.cur?'<span class="bdg ba">Đang về kỳ này</span>':'<span class="bdg bgr">Dự kiến kỳ sau</span>');return '<tr><td style="font-weight:500">'+canCode(x.can,i)+'</td><td>'+(dd.paid||dd.d)+'</td><td>'+fM(dsC)+'</td><td>'+pT.toFixed(0)+'%</td><td class="'+(dd.cur?'pos':'')+'" style="font-weight:500">'+f(dd.hh)+'</td><td>'+st+'</td></tr>';}).join('')+'<tr style="background:var(--color-background-secondary);font-weight:500"><td>Tổng ('+x.dots.length+' căn)</td><td>—</td><td>'+fM(x.ds)+'</td><td>100%</td><td class="pos">'+f(x.hhTong)+'</td><td>—</td></tr>'+'</tbody></table></div>';
    return `
    <tr>
      <td style="font-weight:500">${x.da}<div style="font-size:10px;color:var(--color-text-secondary)">${x.dots.length} căn</div></td>
      <td>${f(x.ds)}</td>
      <td><div style="font-weight:500">${(x.hhR*100).toFixed(1)}%</div><div style="font-size:10px;color:var(--color-text-secondary)">${f(x.hhTong)}</div></td>
      <td><div style="display:flex;align-items:center;gap:4px"><span class="pos" style="font-weight:500">${f(dH)}</span><span class="chev" onclick="toggleHH(${idx},this)" role="button" tabindex="0" aria-label="Lịch sử nhận">${CV}</span></div></td>
      <td style="color:#378ADD;font-weight:500">${cur?f(cur.hh):'—'}</td>
      <td>${f(cl)}</td>
      <td>${mini3(dP,tP)}<div style="font-size:10px;color:var(--color-text-secondary)">${dP+tP}%</div></td>
    </tr>
    <tr class="hh-det" id="hhdet${idx}"><td colspan="7" style="background:var(--color-background-secondary);padding:9px 12px">
      ${detRows}
    </td></tr>`;
  }).join('');
  el.innerHTML=`
  <div class="card">
    <div class="shd">Hoa hồng dự án</div>
    <div class="da-filter-wrap">
      <div class="da-filter-btn" onclick="toggleDA('dadd')">
        <span style="color:var(--color-text-secondary);display:inline-flex">${ico('filter',14)}</span>
        <span>${lbl}</span>
        <span style="margin-left:auto;color:var(--color-text-secondary);display:inline-flex">${ico('chevron-down',13)}</span>
      </div>
      <div id="dadd" class="da-dropdown">
        <div class="da-dd-hdr">Lọc theo dự án</div>
        <div class="da-opt"><input type="checkbox" id="daall" ${isAll?'checked':''} onchange="daAll()"><label for="daall">Tất cả dự án</label></div>
        ${d.hhDa.map((x,i)=>`<div class="da-opt"><input type="checkbox" id="dachk${i}" value="${x.da}" ${selDA.has(x.da)?'checked':''} onchange="daCheck(this)"><label for="dachk${i}">${x.da}</label></div>`).join('')}
      </div>
    </div>
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:10px">HH kỳ này (${show.length} DA): <strong style="color:var(--color-text-info)">${f(totHH)}</strong></div>
    <div style="overflow-x:auto;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)">
      <table class="tbl" style="min-width:720px">
        <thead><tr><th style="width:22%">Dự án</th><th style="width:13%">Doanh số</th><th style="width:15%">HH (%DS · tiền)</th><th style="width:14%">Đã nhận</th><th style="width:13%">Kỳ này</th><th style="width:12%">Còn lại</th><th style="width:11%">% tiến độ</th></tr></thead>
        <tbody>${rows}
          <tr style="background:var(--color-background-secondary);font-weight:500"><td>Tổng cộng (${show.length} DA)</td><td>${fM(sDS)}</td><td>${f(sHHt)}</td><td class="pos">${f(sDa)}</td><td style="color:#378ADD;font-weight:500">${f(sCur)}</td><td>${f(sCl)}</td><td>${sHHt?mini3(Math.round(sDa/sHHt*100),Math.round(sCur/sHHt*100)):''}<div style="font-size:10px;color:var(--color-text-secondary)">${sHHt?Math.round((sDa+sCur)/sHHt*100):0}%</div></td></tr>
        </tbody>
      </table>
    </div>
    <div style="display:flex;gap:12px;font-size:10px;color:var(--color-text-secondary);margin-top:7px">
      <span><span style="width:9px;height:9px;border-radius:2px;background:#185FA5;display:inline-block;vertical-align:middle;margin-right:3px"></span>Đã nhận</span>
      <span><span style="width:9px;height:9px;border-radius:2px;background:#378ADD;display:inline-block;vertical-align:middle;margin-right:3px"></span>Kỳ này</span>
      <span><span style="width:9px;height:9px;border-radius:2px;background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);display:inline-block;vertical-align:middle;margin-right:3px"></span>Còn lại</span>
    </div>
  </div>`;
}

function rTeam(d,c,mon,cid){
  const tm=d.teamMembers||[];

  const totalHH=tm.reduce((s,x)=>s+x.hh,0);
  const cur=d.hhTiers.find(t=>t.m===d.hhMuc);
  const next=d.hhTiers.find(t=>t.need>d.dsTeam);
  const curHH=cur?Math.round(d.dsTeam*cur.r/100):0;
  const nextHH=next?Math.round(d.dsTeam*next.r/100):0;
  const diffHH=nextHH-curHH;
  const tierCards=`<div class="tier-row">${d.hhTiers.map(t=>{
    const isOn=t.m===d.hhMuc;const reach=t.need?Math.min(100,Math.round(d.dsTeam/t.need*100)):100;const hh=Math.round(d.dsTeam*t.r/100);
    return`<div class="tier-c ${isOn?'active':''}"><div class="tier-m">${t.m} ${isOn?'<span class="bdg ba">Đang áp</span>':''}</div><div class="tier-r ${isOn?'pos':''}">${t.r}%</div><div class="tier-hhval ${isOn?'pos':''}">${f(hh)}</div><div class="tier-note">${t.need?'Cần DS ≥ '+fM(t.need):'Mức cơ bản'}</div>${!isOn&&t.need>d.dsTeam?`<div style="font-size:11px;color:var(--color-text-danger);margin-top:3px;font-weight:500">+${f(hh-curHH)} nếu đạt · cần thêm ${fM(t.need-d.dsTeam)}</div>`:isOn&&next?`<div style="font-size:11px;color:var(--color-text-info);margin-top:3px">Lên ${next.m}: +${f(diffHH)}</div>`:''}${t.need?`<div class="pg" style="margin-top:5px"><div class="pf" style="width:${reach}%;background:${reach>=100?'#185FA5':reach>=60?'#378ADD':'#85B7EB'}"></div></div>`:''}</div>`;
  }).join('')}</div>`;
  const rows=tm.map((m,i)=>{
    const pt=totalDS?Math.round(m.ds/totalDS*100):0;
    const avgHH=m.projects.length?(m.projects.reduce((s,p)=>s+(p.ds?p.hh/p.ds:0),0)/m.projects.length*100):0;
    const kpiPct=m.kpi?Math.round(m.ds/m.kpi*100):0;
    const kpiC=kpiPct>=100?'#185FA5':kpiPct>=50?'#378ADD':'#85B7EB';
    const projRows=m.projects.map(p=>`<tr><td style="font-weight:500">${p.da}</td><td>${f(p.ds)}</td><td style="font-size:11px;color:var(--color-text-secondary)">${(p.hh/p.ds*100).toFixed(1)}%</td><td class="pos" style="font-weight:500">${f(p.hh)}</td></tr>`).join('');
    return`
    <tr class="tm-row" onclick="toggleTeam(${i}, this.querySelector('.tmchev'))">
      <td style="font-weight:500">${m.name}</td>
      <td style="font-size:11px;color:var(--color-text-secondary)">${m.ma}</td>
      <td><span class="bdg ${m.role==='CTV'?'bgr':'bi'}">${m.role}</span></td>
      <td style="font-weight:500">${fM(m.ds)}</td>
      <td><div style="display:flex;align-items:center;gap:4px"><div style="height:4px;width:${pt}px;max-width:42px;background:${BCOLS[i%BCOLS.length]};border-radius:2px"></div><span style="font-size:11px">${pt}%</span></div></td>
      <td style="font-weight:500">${avgHH.toFixed(1)}%</td>
      <td class="pos" style="font-weight:500">${f(m.hh)}</td>
      <td>${spark(m.dsTrend,BCOLS[i%BCOLS.length])}</td>
      <td style="text-align:right"><span class="chev tmchev" onclick="event.stopPropagation();toggleTeam(${i},this)" role="button" tabindex="0" aria-label="Chi tiết">${CV}</span></td>
    </tr>
    <tr class="tm-det" id="tmdet${i}"><td colspan="9" style="background:var(--color-background-secondary);padding:10px 12px">
      <div class="tm-det-cards">
        <div class="tm-card"><div class="tm-card-l">Doanh số thực</div><div class="tm-card-v">${f(m.ds)}</div></div>
        <div class="tm-card"><div class="tm-card-l">KPI cá nhân</div><div class="tm-card-v">${f(m.kpi)}</div></div>
        <div class="tm-card"><div class="tm-card-l">% Đạt KPI</div><div class="tm-card-v" style="color:${kpiC}">${kpiPct}%</div><div class="pg" style="margin-top:4px"><div class="pf" style="width:${Math.min(100,kpiPct)}%;background:${kpiC}"></div></div></div>
      </div>
      <div style="font-size:11px;color:var(--color-text-secondary);font-weight:500;margin-bottom:5px">Các dự án đóng góp doanh thu</div>
      <div style="overflow:hidden;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary)">

      </div>

  }).join('');

    <table class="tbl" style="min-width:680px">

      <tbody>${rows}<tr style="background:var(--color-background-secondary);font-weight:500"><td colspan="3">Tổng cộng</td><td>${fM(totalDS)}</td><td>100%</td><td>—</td><td class="pos">${f(totalHH)}</td><td colspan="2"></td></tr></tbody>
    </table>
  </div>`;
  document.getElementById(cid).innerHTML=`
  <div class="card"><div class="shd">Cơ chế HH ${d.role} — 3 mức · DS team ${fM(d.dsTeam)} · KPI ${fM(d.kpiDs)}</div>${tierCards}</div>

    <div class="kc"><div class="kl">DS team / KPI</div><div class="kv">${fM(d.dsTeam)}</div><div class="pg"><div class="pf" style="width:${Math.min(100,Math.round(d.dsTeam/d.kpiDs*100))}%;background:${Math.round(d.dsTeam/d.kpiDs*100)>=100?'#185FA5':'#378ADD'}"></div></div></div>
    <div class="kc"><div class="kl">HH ${d.hhMuc} hiện tại</div><div class="kv pos">${f(curHH)}</div><div class="ks">${cur?cur.r+'%':'—'} × ${fM(d.dsTeam)}</div></div>

  <div class="card"><div class="shd">Bảng DS & HH team tháng ${mon} — nhấn từng dòng để xem dự án</div>${teamTbl}</div>`;

  const lbls=d.trend.map(t=>t.m);
  const lbD=d.trend.map(t=>t.m==='T01'?+(c.lb/1e6).toFixed(1):t.lb);
  const hhD=d.trend.map(t=>t.m==='T01'?+(c.hhN/1e6).toFixed(1):t.hh);
  const thD=d.trend.map(t=>t.m==='T01'?+((d.thuongTet+d.luongT13+(d.thuongDA||0)+(d.kqkd||0))/1e6).toFixed(1):t.th);
  const dsD=d.kpiDs?d.trend.map(t=>t.m==='T01'?+(d.dsTeam/1e6).toFixed(1):t.ds):null;
  const tiersPos=d.hhTiers?d.hhTiers.filter(t=>t.need>0):[];
  const attHtml=d.role==='CTV'?'<div class="nf">CTV không áp dụng chấm công.</div>':`
    <div class="att-wrap"><table class="att-tbl"><thead><tr><th class="thi">Nhân viên</th>${DOW.map((w,i)=>`<th><span style="font-size:9px;display:block;color:var(--color-text-secondary)">${w}</span><span style="font-size:10px;font-weight:500">${i+1}</span></th>`).join('')}<th class="ths">∑</th></tr></thead>
    <tbody><tr><td class="tdi">${d.name}</td>${d.att.map((v,i)=>`<td>${attCell(v,i)}</td>`).join('')}<td class="tds">${d.ngayCong}</td></tr></tbody></table></div>
    ${attLegend()}
    <div class="att-sum"><span>Ngày công: <strong>${d.ngayCong}/${d.chuanT}</strong></span><span>Tỷ lệ: <strong class="up">${pct(d.ngayCong,d.chuanT)}</strong></span><span>Phép còn T02: <strong>${d.phepConT02}/${d.phepNamNay}</strong></span><span>Nghỉ lễ: <strong>${d.ngayLe}</strong></span></div>`;
  const kpiLegend=tiersPos.length?tiersPos.map((t,i)=>`<span><span style="width:14px;height:0;border-top:2px dashed ${['#378ADD','#0C447C','#85B7EB'][i%3]};display:inline-block;vertical-align:middle;margin-right:3px"></span>KPI ${t.m} (${fM(t.need)})</span>`).join(''):'';
  document.getElementById(cid).innerHTML=`
  <div class="chart2">
    <div class="card">
      <div class="shd">Thu nhập 7 tháng (triệu đ) — bar chồng</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px;font-size:10px">
        <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:#888780;display:inline-block"></span>Lương CB</span>
        <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:#378ADD;display:inline-block"></span>HH DA</span>
        <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:#0C447C;display:inline-block"></span>Thưởng</span>
      </div>
      <div style="position:relative;height:200px"><canvas id="c1" role="img" aria-label="Thu nhập chồng 7 tháng">Thu nhập.</canvas></div>
    </div>
    <div class="card">
      ${d.kpiDs?`
      <div class="shd">Doanh số theo dự án vs KPI</div>
      <div class="chart-leg" style="margin-bottom:6px;font-size:10px">
        ${(d.daDist||[]).map((x,i)=>`<span><span style="width:9px;height:9px;border-radius:2px;background:${BCOLS[i%BCOLS.length]};display:inline-block;vertical-align:middle;margin-right:3px"></span>${x.da}</span>`).join('')}
        ${kpiLegend}
      </div>
      <div style="position:relative;height:200px"><canvas id="c2" role="img" aria-label="DS theo DA vs KPI">DS theo DA và mức KPI.</canvas></div>`:`
      <div class="shd">Cơ cấu thu nhập tháng ${mon}</div>
      <div style="position:relative;height:200px"><canvas id="c2" role="img" aria-label="Cơ cấu thu nhập">Cơ cấu.</canvas></div>`}
    </div>
  </div>
  <div id="hhsec"></div>
  <div class="card"><div class="shd">Chấm công ${mon}</div>${attHtml}</div>`;
  renderHHSection();
  setTimeout(()=>{
    const c1=document.getElementById('c1'),c2=document.getElementById('c2');
    if(c1)charts.c1=new Chart(c1,{type:'bar',data:{labels:lbls,datasets:[{label:'Lương CB',data:lbD,backgroundColor:'#888780',stack:'a'},{label:'HH DA',data:hhD,backgroundColor:'#378ADD',stack:'a'},{label:'Thưởng',data:thD,backgroundColor:'#0C447C',stack:'a'}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+'M'}}},scales:{x:{stacked:true,ticks:{color:txS,font:{size:10},autoSkip:false},grid:{display:false},border:{display:false}},y:{stacked:true,ticks:{color:txS,font:{size:10},callback:v=>v+'M'},grid:{color:gC},border:{display:false}}}}});
    if(c2&&d.kpiDs&&dsD&&d.daDist&&d.daDist.length){
      const daDS=d.daDist.map((x,i)=>({label:x.da,data:lbls.map(m=>{if(m==='T01')return +x.ds.toFixed(1);const total=(d.trend.find(tt=>tt.m===m)||{}).ds||0;return +((x.pct/100)*total).toFixed(1);}),backgroundColor:BCOLS[i%BCOLS.length],stack:'b'}));
      const kpiLines=tiersPos.map((t,i)=>({type:'line',label:'KPI '+t.m,data:lbls.map(()=>+(t.need/1e6).toFixed(1)),borderColor:['#378ADD','#0C447C','#85B7EB'][i%3],borderWidth:1.5,borderDash:[5,3],pointRadius:0,fill:false,stack:'kpi'+i}));
      charts.c2=new Chart(c2,{type:'bar',data:{labels:lbls,datasets:[...daDS,...kpiLines]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+'M'}}},scales:{x:{stacked:true,ticks:{color:txS,font:{size:10},autoSkip:false},grid:{display:false},border:{display:false}},y:{stacked:true,ticks:{color:txS,font:{size:10},callback:v=>v+'M'},grid:{color:gC},border:{display:false}}}}});
    } else if(c2){
      const pl=[],pd=[],pc=[];
      if(c.lb>0){pl.push('Lương CB');pd.push(+(c.lb/1e6).toFixed(1));pc.push('#888780');}
      if(c.hhN>0){pl.push('HH DA');pd.push(+(c.hhN/1e6).toFixed(1));pc.push('#378ADD');}
      if(d.thuongTet>0){pl.push('Thưởng Tết');pd.push(+(d.thuongTet/1e6).toFixed(1));pc.push('#185FA5');}
      if(d.luongT13>0){pl.push('Lương T13');pd.push(+(d.luongT13/1e6).toFixed(1));pc.push('#85B7EB');}
      if(c.kq>0){pl.push('KQKD');pd.push(+(c.kq/1e6).toFixed(1));pc.push('#0C447C');}
      if(pd.length)charts.c2=new Chart(c2,{type:'doughnut',data:{labels:pl,datasets:[{data:pd,backgroundColor:pc,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'right',labels:{color:txS,font:{size:10},boxWidth:10,padding:6}}},cutout:'58%'}});
    }
  },60);
}

document.getElementById('nv').addEventListener('keydown',e=>{if(e.key==='Enter')window.go();});
['dStart','dEnd'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('change',()=>{if(document.getElementById('content').style.display!=='none')window.go();});});
document.addEventListener('click',function(e){
  const dd=document.getElementById('dadd');
  if(dd&&dd.classList.contains('open')){const btn=dd.previousElementSibling;if(!dd.contains(e.target)&&btn&&!btn.contains(e.target))dd.classList.remove('open');}
});
window.go();
})();
</script>
</body>
</html>
